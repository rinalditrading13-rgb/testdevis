<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clarity Systems — Démo vocale</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #1FA8C1;
    --accent-light: rgba(31,168,193,0.12);
    --accent-glow: rgba(31,168,193,0.28);
    --bg: #E8EAF0;
    --card: rgba(255,255,255,0.82);
    --card-solid: #ffffff;
    --text-primary: #0a0a0f;
    --text-secondary: #6b7280;
    --text-tertiary: #a0a6b1;
    --border: rgba(0,0,0,0.06);
    --border-strong: rgba(0,0,0,0.10);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 20px 48px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: var(--bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 8px;
    min-height: 100vh;
    width: 100%;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 10%, rgba(31,168,193,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 90%, rgba(31,168,193,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    background: rgba(248,249,252,0.92);
    width: 100%;
    max-width: 600px;
    border-radius: var(--radius-lg);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.6);
    animation: appIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @media (max-width: 560px) {
    #app {
      width: 100%;
      min-width: unset;
      max-width: 100%;
    }
  }

  @keyframes appIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─── HEADER ─── */
  header {
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.70);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 148px;
    display: block;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(31,168,193,0.18);
  }

  .header-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    margin: 12px 12px 0;
    padding: 3px;
    border-radius: 13px;
    background: rgba(60,60,67,0.09);
  }

  .tab {
    flex: 1;
    padding: 9px 6px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-tertiary);
    border-radius: 10px;
    transition: all 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .tab.active {
    background: #ffffff;
    color: var(--text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.04);
  }

  /* ─── CONTENT AREA ─── */
  #content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: none;
    width: 100%;
    box-sizing: border-box;
  }

  #content::-webkit-scrollbar { display: none; }

  /* ─── CARD ─── */
  .card {
    background: rgba(255,255,255,0.88);
    border-radius: var(--radius-md);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(255,255,255,0.9);
    animation: cardIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    width: 100%;
    box-sizing: border-box;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:active { transform: scale(0.99); }

  /* ─── INFO CARD ─── */
  .info-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .info-section { display: flex; flex-direction: column; gap: 5px; }

  .info-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .info-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.01em;
    display: block;
    width: 100%;
  }

  .info-body {
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-secondary);
    display: block;
    width: 100%;
  }

  .steps { display: flex; flex-direction: column; gap: 6px; }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
  }

  .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .example-block {
    background: rgba(31,168,193,0.05);
    border: 1px solid rgba(31,168,193,0.12);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text-secondary);
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
  }

  .example-block span {
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 -16px;
  }

  /* ─── ACTION CARD ─── */
  .action-card { display: flex; flex-direction: column; gap: 12px; }

  /* Email input */
  .input-wrap { position: relative; }

  .input-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    letter-spacing: 0.03em;
    margin-bottom: 6px;
  }

  .email-input {
    width: 100%;
    height: 42px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border-strong);
    padding: 0 14px;
    font-size: 16px;
    font-family: inherit;
    background: #fff;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.03);
    -webkit-text-size-adjust: 100%;
  }

  .email-input::placeholder { color: var(--text-tertiary); font-size: 16px; }
  .email-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light), inset 0 1px 3px rgba(0,0,0,0.03);
  }

  .input-error {
    font-size: 11.5px;
    font-weight: 600;
    color: #e34646;
    text-align: center;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  /* ─── BUTTON ─── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    height: 44px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    letter-spacing: -0.01em;
  }

  .btn-primary {
    background: linear-gradient(175deg, #27b5ce 0%, #1799B0 100%);
    color: #fff;
    box-shadow: 0 6px 18px var(--accent-glow), 0 2px 6px rgba(0,0,0,0.1);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.1);
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.92; }

  .btn-stop {
    background: rgba(231,76,60,0.09);
    color: #e74c3c;
    border: 1.5px solid rgba(231,76,60,0.15);
    box-shadow: none;
  }

  .btn-stop:hover { background: rgba(231,76,60,0.14); }
  .btn-stop:active { transform: scale(0.97); }

  .btn-demo {
    background: var(--accent-light);
    color: var(--accent);
    border: 1.5px solid rgba(31,168,193,0.2);
    box-shadow: none;
    height: 40px;
    font-size: 13px;
  }

  .btn-demo:hover { background: rgba(31,168,193,0.17); }
  .btn-demo:active { transform: scale(0.97); }

  /* ─── RECORDING STATE ─── */
  .recording-ui {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 6px 0 4px;
  }

  .mic-pulse {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, #27b5ce, #1799B0);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 0 var(--accent-glow);
    animation: micPulse 1.6s infinite cubic-bezier(0.4, 0, 0.6, 1);
  }

  .mic-icon {
    width: 20px;
    height: 20px;
    fill: white;
  }

  @keyframes micPulse {
    0%   { box-shadow: 0 0 0 0 rgba(31,168,193,0.5); }
    70%  { box-shadow: 0 0 0 14px rgba(31,168,193,0); }
    100% { box-shadow: 0 0 0 0 rgba(31,168,193,0); }
  }

  .recording-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.03em;
  }

  .recording-sub {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: -4px;
    margin-bottom: 4px;
  }

  /* ─── PROCESSING STATE ─── */
  .processing-ui {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 2.5px solid var(--accent-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  /* ─── DONE STATE ─── */
  .done-ui {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }

  .done-check {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #34d399, #10b981);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 16px rgba(16,185,129,0.28);
    animation: checkIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes checkIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .done-check svg { width: 22px; height: 22px; stroke: white; stroke-width: 2.5; fill: none; }

  .done-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 4px;
    letter-spacing: -0.01em;
  }

  .done-msg {
    font-size: 12px;
    color: var(--text-tertiary);
    line-height: 1.5;
  }

  .done-divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .done-cta-label {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 500;
  }

  /* ─── FOOTNOTE ─── */
  .footnote {
    font-size: 10.5px;
    color: var(--text-tertiary);
    text-align: center;
    line-height: 1.5;
    opacity: 0.75;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%);
    background: rgba(15,15,20,0.88);
    color: #fff;
    padding: 10px 18px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    backdrop-filter: blur(12px);
    z-index: 9999;
    white-space: nowrap;
    animation: toastIn 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
</style>

</head>

<body>
<div id="app">

  <header>
    <img src="https://i.imgur.com/1ZFTLIo.png" class="logo" alt="Clarity Systems">
    <span class="header-badge">Démo interactive</span>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('mail', this)">✉️ Mail vocal</div>
    <div class="tab" onclick="switchTab('devis', this)">📄 Devis vocal</div>
  </div>

  <div id="content"></div>

</div>

<script>
const WEBHOOKS = {
  mail:  "https://hook.eu1.make.com/q4na5x9jj8qadnl5gjoecxzcjrlakjel",
  devis: "https://hook.eu1.make.com/gvcwymtdvuau19zpytftaceigsinnj19"
};

let currentTab = "mail";
let emailStore = { mail: "", devis: "" };
let emailError = { mail: "", devis: "" };
let recordingState = { mail: "idle", devis: "idle" };

let mediaRecorder = null;
let audioChunks = [];

/* ─── TAB SWITCH ─── */
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

/* ─── TOAST ─── */
function showToast(msg) {
  document.querySelector(".toast")?.remove();
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

/* ─── EMAIL ─── */
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim()); }

function handleEmailInput(v) {
  emailStore[currentTab] = v;
  emailError[currentTab] = v.trim() === "" ? "" : isValidEmail(v) ? "" : "Adresse email invalide";
  const errEl = document.getElementById("emailError");
  if (errEl) errEl.textContent = emailError[currentTab];
}

/* ─── RECORDING ─── */
async function startDictation() {
  if (["done","processing"].includes(recordingState[currentTab])) return;
  const email = (emailStore[currentTab] || "").trim();
  if (!email || !isValidEmail(email)) {
    emailError[currentTab] = email ? "Adresse email invalide" : "Veuillez entrer votre email";
    render(); return;
  }
  emailError[currentTab] = "";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data?.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      recordingState[currentTab] = "processing";
      render();
      const fd = new FormData();
      fd.append("audio", blob, "audio.webm");
      fd.append("email", emailStore[currentTab]);
      fd.append("type", currentTab);
      try {
        await fetch(WEBHOOKS[currentTab], { method: "POST", body: fd });
        recordingState[currentTab] = "done";
      } catch {
        recordingState[currentTab] = "idle";
        emailError[currentTab] = "Erreur d'envoi, réessayez";
      }
      stream.getTracks().forEach(t => t.stop());
      render();
    };
    mediaRecorder.start();
    recordingState[currentTab] = "recording";
    render();
  } catch {
    emailError[currentTab] = "Accès micro refusé ou indisponible";
    render();
  }
}

function stopDictation() {
  if (mediaRecorder?.state !== "inactive") mediaRecorder.stop();
  else { recordingState[currentTab] = "idle"; render(); }
}

/* ─── RENDER ─── */
function render() {
  const content = document.getElementById("content");
  const tab = currentTab;
  const state = recordingState[tab];
  const err = emailError[tab];

  const INFO = {
    mail: {
      label: "Messagerie intelligente",
      title: "Fini de taper vos emails",
      desc: "Parlez, votre email professionnel part tout seul en quelques secondes.<br>Testez ici — imaginez le résultat pour vos clients.",
      steps: ["Entrez votre adresse email", "Appuyez sur Commencer", "Parlez normalement"],
      exampleLabel: "Exemple à dicter",
      example: `« Écris à Anthony pour le remercier de sa visite.\nDis-lui que son devis sera envoyé aujourd'hui.\nTermine en lui souhaitant une bonne journée. »`,
      footnote: "Votre message est envoyé automatiquement à l'adresse indiquée.",
      doneTitle: "Email en route !",
      doneMsg: "Il arrive dans quelques secondes.\nVérifiez vos spams si besoin."
    },
    devis: {
      label: "Devis automatisé",
      title: "Parlez, on s'occupe du reste",
      desc: "Dictez vos prestations, votre PDF part tout seul en quelques secondes.<br>Testez ici — imaginez le résultat pour vos clients.",
      steps: ["Entrez votre adresse email", "Appuyez sur Commencer", "Dictez vos lignes de devis"],
      exampleLabel: "Exemples à dicter",
      example: `• Pose de carrelage, 20 m² à 20 € le mètre\n• Fourniture de spots, 10 pièces à 15 € l'unité\n• Installation portail, forfait à 3 000 €`,
      footnote: "Jusqu'à 5 lignes pour cette démo. Devis envoyé à l'adresse indiquée.",
      doneTitle: "Devis en création !",
      doneMsg: "Votre PDF arrive dans quelques secondes.\nVérifiez vos spams si besoin."
    }
  }[tab];

  const micIcon = `<svg class="mic-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
    <path d="M19 10a7 7 0 0 1-14 0M12 19v4M8 23h8"/>
  </svg>`;

  const stopIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="3"/></svg>`;
  const calIcon  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`;

  let actionHTML = "";
  if (state === "idle") {
    actionHTML = `
      <div class="btn btn-primary" onclick="startDictation()">
        ${micIcon.replace('class="mic-icon"','style="width:18px;height:18px;fill:white;stroke:white;stroke-width:0;"')} Commencer l'enregistrement
      </div>
      <p class="footnote">${INFO.footnote}</p>
      <p class="footnote" style="margin-top:3px;opacity:0.55;">Version de démonstration — les versions pro sont plus complètes.</p>
    `;
  } else if (state === "recording") {
    actionHTML = `
      <div class="recording-ui">
        <div class="mic-pulse">
          <svg style="width:20px;height:20px;fill:white;" viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/><path d="M19 10a7 7 0 0 1-14 0M12 19v4M8 23h8" stroke="white" stroke-width="1.5" fill="none"/></svg>
        </div>
        <span class="recording-label">Enregistrement en cours…</span>
        <span class="recording-sub">Parlez naturellement</span>
        <div class="btn btn-stop" onclick="stopDictation()" style="margin-top:2px;">${stopIcon} Arrêter</div>
      </div>
    `;
  } else if (state === "processing") {
    actionHTML = `
      <div class="processing-ui">
        <div class="spinner"></div>
        <span class="processing-label">Traitement en cours…</span>
      </div>
    `;
  } else {
    actionHTML = `
      <div class="done-ui">
        <div class="done-check">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <p class="done-title">${INFO.doneTitle}</p>
        <p class="done-msg">${INFO.doneMsg.replace('\n','<br>')}</p>
        <div class="done-divider"></div>
        <p class="done-cta-label">Vous voulez ce système pour votre entreprise ?</p>
        <div class="btn btn-demo" onclick="window.open('https://calendly.com/contact-claritysystems/prise-de-rendez-vous','_blank')">
          ${calIcon} Réserver une démo gratuite
        </div>
      </div>
    `;
  }

  content.innerHTML = `
    <div class="card info-card" style="animation-delay:0.05s">
      <div class="info-section">
        <span class="info-label">${INFO.label}</span>
        <h2 class="info-title">${INFO.title}</h2>
        <p class="info-body">${INFO.desc}</p>
      </div>
      <div class="divider"></div>
      <div class="info-section">
        <span class="info-label">Comment ça marche</span>
        <div class="steps">
          ${INFO.steps.map((s,i) => `<div class="step"><span class="step-num">${i+1}</span>${s}</div>`).join('')}
        </div>
      </div>
      <div class="info-section">
        <span class="info-label">${INFO.exampleLabel}</span>
        <div class="example-block">${INFO.example.split('\n').map(line => `<span>${line}</span>`).join('')}</div>
      </div>
    </div>

    <div class="card action-card" style="animation-delay:0.1s">
      <div class="input-wrap">
        <div class="input-label">Votre adresse email</div>
        <input
          id="emailInput"
          class="email-input"
          type="email"
          placeholder="vous@exemple.com"
          value="${emailStore[tab] || ''}"
          oninput="handleEmailInput(this.value)"
          autocomplete="email"
          ${state !== 'idle' ? 'disabled' : ''}
        >
      </div>
      ${err ? `<p id="emailError" class="input-error">${err}</p>` : '<p id="emailError" class="input-error" style="display:none"></p>'}
      ${actionHTML}
    </div>
  `;
}

document.addEventListener("DOMContentLoaded", render);
</script>

</body>
</html>
