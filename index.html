<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clarity Systems - Vérifications</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
  background: #f2f2f7;
  display: flex;
  justify-content: center;
  padding: 20px;
}

#app {
  background: rgba(255,255,255,0.92);
  width: 100%;
  max-width: 420px;
  height: 90vh;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 18px 40px rgba(0,0,0,0.10);
  overflow: hidden;
  backdrop-filter: blur(12px);
}

header {
  padding: 16px;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(10px);
}

.logo {
  width: 220px;
  max-width: 100%;
}

.tabs {
  display: flex;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.76);
  backdrop-filter: blur(10px);
}

.tab {
  flex: 1;
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
  color: #111;
  transition: color 0.2s ease;
}

.tab.active {
  color: #209DB5;
  border-bottom: 3px solid #209DB5;
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  background: #f6f6f8;
}

.item {
  background: rgba(255,255,255,0.84);
  padding: 12px 14px;
  border-radius: 18px;
  margin-bottom: 14px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.25s ease;
  backdrop-filter: blur(10px);
}

.item:active {
  transform: scale(0.985);
}

.item.red {
  border-left: 4px solid #e74c3c;
}

.item.green {
  border-left: 4px solid #2ecc71;
}

.item.orange {
  border-left: 4px solid #f39c12;
}

.item-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}

.item h3 {
  margin: 0;
  font-size: 14px;
  font-weight: 700;
  line-height: 1.15;
  color: #111;
}

.item p {
  margin: 0;
  font-size: 11px;
  line-height: 1.15;
  color: #8e8e93;
}

button {
  background: linear-gradient(180deg, #2aa8c1 0%, #209DB5 100%);
  color: white;
  border: none;
  height: 31px;
  padding: 0 13px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  min-width: 74px;
  flex-shrink: 0;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(32,157,181,0.22);
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

button:hover {
  box-shadow: 0 6px 14px rgba(32,157,181,0.28);
}

button:active {
  transform: scale(0.97);
  opacity: 0.95;
}

.empty {
  text-align: center;
  color: #777;
  margin-top: 40px;
  font-size: 13px;
  animation: fadeIn 0.25s ease;
}

.popup {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.28);
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.18s ease;
}

.popup-content {
  background: rgba(255,255,255,0.92);
  padding: 20px;
  border-radius: 16px;
  width: 80%;
  max-width: 300px;
  text-align: center;
  box-shadow: 0 16px 30px rgba(0,0,0,0.14);
  backdrop-filter: blur(12px);
  animation: popIn 0.2s ease;
}

.popup-content p {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  color: #111;
}

.popup-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.popup-buttons button {
  flex: 1;
  min-width: 0;
}

.popup-buttons button:first-child {
  background: #ececef;
  color: #111;
  box-shadow: none;
}

.popup-buttons button:first-child:hover {
  box-shadow: none;
}

.success-toast {
  position: fixed;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%);
  background: rgba(20,20,20,0.88);
  color: #fff;
  padding: 10px 16px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 10px 24px rgba(0,0,0,0.18);
  backdrop-filter: blur(10px);
  z-index: 9999;
  animation: toastIn 0.25s ease;
}

.item.removing {
  opacity: 0;
  transform: translateX(10px) scale(0.98);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes pulseMic {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(32,157,181,0.35);
  }
  70% {
    transform: scale(1.08);
    box-shadow: 0 0 0 12px rgba(32,157,181,0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(32,157,181,0);
  }
}
</style>
</head>

<body>

<div id="app">

<header>
<img src="https://i.imgur.com/1ZFTLIo.png" class="logo" alt="Clarity Systems">
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('mail', this)">Mail vocal</div>
  <div class="tab" onclick="switchTab('devis', this)">Devis vocal</div>
</div>

<div id="content"></div>

</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <p>Confirmer la vérification ?</p>
    <div class="popup-buttons">
      <button onclick="closePopup()">Annuler</button>
      <button onclick="confirmValidation()">Confirmer</button>
    </div>
  </div>
</div>

<script>
const webhookGet = "https://hook.eu1.make.com/nef2xbgyv3xbgt5tdufuhlgmur8uo5om";
const webhookPost = "https://hook.eu1.make.com/8jn8w4ocie8mvwdoa23650iw9o3ngoyz";
const webhookHistory = "https://hook.eu1.make.com/hvkdbbarp5tgk0azcwftpx6glful4y1f";

let data = [];
let historyData = [];
let currentId = null;
let currentTab = "mail";
  let emailStore = {
  mail: "",
  devis: ""
};

let emailError = {
  mail: "",
  devis: ""
};

let recordingState = {
  mail: "idle",
  devis: "idle"
};

async function loadData() {
  try {
    const mainRes = await fetch(webhookGet);
    data = await mainRes.json();
  } catch {
    data = [];
  }

  try {
    if (webhookHistory && webhookHistory !== "TON_WEBHOOK_HISTORIQUE") {
      const historyRes = await fetch(webhookHistory);
      historyData = await historyRes.json();
    } else {
      historyData = [];
    }
  } catch {
    historyData = [];
  }

  render();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function formatDateFR(dateString) {
  const date = new Date(dateString);

  let formatted = date.toLocaleDateString("fr-FR", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });

  return formatted.charAt(0).toUpperCase() + formatted.slice(1);
}

function showToast(message) {
  const existing = document.querySelector(".success-toast");
  if (existing) existing.remove();

  const toast = document.createElement("div");
  toast.className = "success-toast";
  toast.textContent = message;
  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 1600);
}

  function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

function handleEmailInput(value) {
  emailStore[currentTab] = value;

  if (value.trim() === "") {
    emailError[currentTab] = "";
  } else if (!isValidEmail(value)) {
    emailError[currentTab] = "Adresse email invalide";
  } else {
    emailError[currentTab] = "";
  }
}

function startDictation() {
  alert("Le bouton fonctionne");

  const email = (emailStore[currentTab] || "").trim();

  if (!email) {
    emailError[currentTab] = "Entrez votre email";
    render();
    return;
  }

  if (!isValidEmail(email)) {
    emailError[currentTab] = "Adresse email invalide";
    render();
    return;
  }

  emailError[currentTab] = "";
  recordingState[currentTab] = "recording";
  render();
}

function stopDictation() {
  alert("Arrêt demandé");

  recordingState[currentTab] = "processing";
  render();

  setTimeout(() => {
    recordingState[currentTab] = "idle";
    showToast("Traitement terminé");
    render();
  }, 1800);
}

function render() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  if (currentTab === "mail") {
    content.innerHTML = `
<div class="item">
  <div class="item-info">
    <h3>Test mail vocal</h3>
    <p>Entrez votre email, puis dictez votre message.<br>
    Vous recevrez le résultat directement par mail.</p>
    <br>
    <h3>Exemple à dicter</h3>
    <p>Écris un mail à Anthony pour le remercier de son appel.<br>
    Dis-lui que son devis sera envoyé aujourd’hui.<br>
    Termine en lui souhaitant une bonne journée.</p>
  </div>
</div>

<div class="item" style="display:block; padding:16px 14px;">
  <div style="margin-bottom:16px;">
    <input
      id="emailInput"
      type="email"
      placeholder="Entrez votre email"
      value="${emailStore.mail || ""}"
      oninput="handleEmailInput(this.value)"
      style="
        height:34px;
        border-radius:10px;
        border:1px solid rgba(0,0,0,0.15);
        padding:0 12px;
        font-size:12px;
        width:100%;
        box-sizing:border-box;
        background:#ffffff;
        color:#111;
      "
      onfocus="this.style.border='1px solid #209DB5'"
      onblur="this.style.border='1px solid rgba(0,0,0,0.15)'"
    >
  </div>

  ${emailError.mail ? `
    <div style="margin-bottom:12px; font-size:11px; color:#e74c3c; text-align:center; font-weight:600;">
      ${emailError.mail}
    </div>
  ` : ""}

  ${
    recordingState.mail === "idle" ? `
      <div style="display:flex; justify-content:center; margin-bottom:14px;">
        <button onclick="startDictation()">Commencer</button>
      </div>
      <div class="item-info">
        <p>Votre mail sera généré et envoyé automatiquement.</p>
        <p style="font-size:10px; opacity:0.6;">Version de démonstration simplifiée — les versions professionnelles sont plus complètes.</p>
      </div>
    ` : recordingState.mail === "recording" ? `
      <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:10px;">
        <div style="
          width:14px;
          height:14px;
          border-radius:50%;
          background:#209DB5;
          box-shadow:0 0 0 0 rgba(32,157,181,0.35);
          animation:pulseMic 1.4s infinite;
          margin-bottom:10px;
        "></div>
        <div style="font-size:11px; color:#8e8e93; margin-bottom:14px;">Enregistrement en cours...</div>
        <button onclick="stopDictation()">Arrêter</button>
      </div>
    ` : `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div style="
          width:14px;
          height:14px;
          border-radius:50%;
          background:#209DB5;
          opacity:0.75;
          margin-bottom:10px;
        "></div>
        <div style="font-size:11px; color:#8e8e93;">Traitement en cours...</div>
      </div>
    `
  }
</div>
    `;
  } else if (currentTab === "devis") {
    content.innerHTML = `
<div class="item">
  <div class="item-info">
    <h3>Test devis vocal</h3>
    <p>Entrez votre email, puis dictez votre devis.<br>
    Vous recevrez votre PDF directement par mail.</p>
    <br>
    <h3>Exemples à dicter</h3>
    <p>
• Pose de carrelage, 20 m² à 20 euros le mètre carré<br>
• Fourniture de spots, 10 pièces à 15 euros l’unité<br>
• Installation portail, forfait à 3000 euros
    </p>
  </div>
</div>

<div class="item" style="display:block; padding:16px 14px;">
  <div style="margin-bottom:16px;">
    <input
      id="emailInput"
      type="email"
      placeholder="Entrez votre email"
      value="${emailStore.devis || ""}"
      oninput="handleEmailInput(this.value)"
      style="
        height:34px;
        border-radius:10px;
        border:1px solid rgba(0,0,0,0.15);
        padding:0 12px;
        font-size:12px;
        width:100%;
        box-sizing:border-box;
        background:#ffffff;
        color:#111;
      "
      onfocus="this.style.border='1px solid #209DB5'"
      onblur="this.style.border='1px solid rgba(0,0,0,0.15)'"
    >
  </div>

  ${emailError.devis ? `
    <div style="margin-bottom:12px; font-size:11px; color:#e74c3c; text-align:center; font-weight:600;">
      ${emailError.devis}
    </div>
  ` : ""}

  ${
    recordingState.devis === "idle" ? `
      <div style="display:flex; justify-content:center; margin-bottom:14px;">
        <button onclick="startDictation()">Commencer</button>
      </div>
      <div class="item-info">
        <p>Pour ce test, vous pouvez dicter jusqu’à 5 lignes.<br>
        Votre devis sera généré et envoyé automatiquement.</p>
        <p style="font-size:10px; opacity:0.6;">Version de démonstration simplifiée — les versions professionnelles sont plus complètes.</p>
      </div>
    ` : recordingState.devis === "recording" ? `
      <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:10px;">
        <div style="
          width:14px;
          height:14px;
          border-radius:50%;
          background:#209DB5;
          box-shadow:0 0 0 0 rgba(32,157,181,0.35);
          animation:pulseMic 1.4s infinite;
          margin-bottom:10px;
        "></div>
        <div style="font-size:11px; color:#8e8e93; margin-bottom:14px;">Enregistrement en cours...</div>
        <button onclick="stopDictation()">Arrêter</button>
      </div>
    ` : `
      <div style="display:flex; flex-direction:column; align-items:center;">
        <div style="
          width:14px;
          height:14px;
          border-radius:50%;
          background:#209DB5;
          opacity:0.75;
          margin-bottom:10px;
        "></div>
        <div style="font-size:11px; color:#8e8e93;">Traitement en cours...</div>
      </div>
    `
  }
</div>
    `;
  }
}

function openPopup(id) {
  currentId = id;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

async function confirmValidation() {
  const card = document.getElementById(`item-${currentId}`);

  try {
    await fetch(webhookPost, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: currentId })
    });
  } catch {}

  closePopup();

  if (card) {
    card.classList.add("removing");
  }

  showToast("✅ Vérification enregistrée");
  setTimeout(loadData, 450);
}

document.addEventListener("DOMContentLoaded", () => {
  loadData();
});
</script>

</body>
</html>
