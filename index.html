<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clarity Systems - Démo vocale</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #eeeff3;
  display: flex;
  justify-content: center;
  padding: 20px;
}

#app {
  background: rgba(252,252,253,0.94);
  width: 100%;
  max-width: 420px;
  height: 90vh;
  border-radius: 22px;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 18px 40px rgba(0,0,0,0.10),
    0 2px 8px rgba(0,0,0,0.04);
  overflow: hidden;
  backdrop-filter: blur(12px);
}

header {
  padding: 12px 12px 10px 12px;
  min-height: 108px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.86);
  backdrop-filter: blur(14px);
}

.logo {
  width: 160px;
  max-width: 100%;
  display: block;
}

.tabs {
  display: flex;
  margin: 8px 10px 0 10px;
  padding: 4px;
  border-radius: 14px;
  background: rgba(60,60,67,0.08);
}

.tab {
  flex: 1;
  padding: 10px 6px;
  text-align: center;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  color: #9CA3AF;
  border-radius: 10px;
  transition: all 0.2s ease;
}

.tab.active {
  background: #ffffff;
  color: #111827;
  box-shadow:
    0 2px 6px rgba(0,0,0,0.06),
    0 0 0 1px rgba(0,0,0,0.03);
}

#content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #f3f4f6;
}

.item {
  background: #f7f7f9;
  padding: 10px 12px;
  border-radius: 18px;
  margin-bottom: 10px;
  box-shadow:
    0 6px 18px rgba(0,0,0,0.06),
    0 1px 2px rgba(0,0,0,0.04);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.25s ease;
  backdrop-filter: blur(10px);
}

.item:active {
  transform: scale(0.985);
}

.item-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}

.item h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 700;
  line-height: 1.2;
  color: #0f172a;
}

.item p {
  margin: 0;
  font-size: 12.5px;
  line-height: 1.4;
  color: #6B7280;
}

button {
  background: linear-gradient(180deg, #2aa8c1 0%, #209DB5 100%);
  color: white;
  border: none;
  height: 31px;
  padding: 0 13px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  min-width: 74px;
  flex-shrink: 0;
  cursor: pointer;
  box-shadow:
    0 6px 14px rgba(32,157,181,0.25),
    0 2px 4px rgba(0,0,0,0.08);
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}

button:hover {
  box-shadow: 0 6px 14px rgba(32,157,181,0.28);
}

button:active {
  transform: scale(0.97);
  opacity: 0.95;
}

.empty {
  text-align: center;
  color: #777;
  margin-top: 40px;
  font-size: 13px;
  animation: fadeIn 0.25s ease;
}

.success-toast {
  position: fixed;
  left: 50%;
  bottom: 28px;
  transform: translateX(-50%);
  background: rgba(20,20,20,0.88);
  color: #fff;
  padding: 10px 16px;
  border-radius: 14px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 10px 24px rgba(0,0,0,0.18);
  backdrop-filter: blur(10px);
  z-index: 9999;
  animation: toastIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes pulseMic {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(32,157,181,0.35);
  }
  70% {
    transform: scale(1.08);
    box-shadow: 0 0 0 12px rgba(32,157,181,0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(32,157,181,0);
  }
}
</style>
</head>

<body>

<div id="app">

<header>
<img src="https://i.imgur.com/1ZFTLIo.png" class="logo" alt="Clarity Systems">
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('mail', this)">Mail vocal</div>
  <div class="tab" onclick="switchTab('devis', this)">Devis vocal</div>
</div>

<div id="content"></div>

</div>

<script>
const webhookMailAudio = "https://hook.eu1.make.com/q4na5x9jj8qadnl5gjoecxzcjrlakjel";
const webhookDevisAudio = "https://hook.eu1.make.com/gvcwymtdvuau19zpytftaceigsinnj19";
  
let currentTab = "mail";
  let emailStore = {
  mail: "",
  devis: ""
};

let emailError = {
  mail: "",
  devis: ""
};

let recordingState = {
  mail: "idle",
  devis: "idle"
};

let mediaRecorder = null;
let audioChunks = [];
let recordedBlob = null;

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function showToast(message) {
  const existing = document.querySelector(".success-toast");
  if (existing) existing.remove();

  const toast = document.createElement("div");
  toast.className = "success-toast";
  toast.textContent = message;
  document.body.appendChild(toast);

  setTimeout(() => {
    toast.remove();
  }, 1600);
}

  function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

function handleEmailInput(value) {
  emailStore[currentTab] = value;

  if (value.trim() === "") {
    emailError[currentTab] = "";
  } else if (!isValidEmail(value)) {
    emailError[currentTab] = "Adresse email invalide";
  } else {
    emailError[currentTab] = "";
  }
}

async function startDictation() {
  if (recordingState[currentTab] === "done" || recordingState[currentTab] === "processing") {
  return;
}
  
  const email = (emailStore[currentTab] || "").trim();

  if (!email) {
    emailError[currentTab] = "Entrez votre email";
    render();
    return;
  }

  if (!isValidEmail(email)) {
    emailError[currentTab] = "Adresse email invalide";
    render();
    return;
  }

  emailError[currentTab] = "";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioChunks = [];
    recordedBlob = null;

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = function(event) {
      if (event.data && event.data.size > 0) {
        audioChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = async function() {
  recordedBlob = new Blob(audioChunks, { type: "audio/webm" });

  recordingState[currentTab] = "processing";
  render();

  const formData = new FormData();
  formData.append("audio", recordedBlob, "audio.webm");
  formData.append("email", emailStore[currentTab] || "");
  formData.append("type", currentTab);

  try {
    const webhookUrl = getCurrentAudioWebhook();

    await fetch(webhookUrl, {
      method: "POST",
      body: formData
    });

    recordingState[currentTab] = "done";
    render();
  } catch (error) {
    recordingState[currentTab] = "idle";
    emailError[currentTab] = "Erreur d’envoi";
    render();
  }

  stream.getTracks().forEach(track => track.stop());
};

    mediaRecorder.start();
    recordingState[currentTab] = "recording";
    render();

  } catch {
    emailError[currentTab] = "Accès micro refusé ou indisponible";
    render();
  }
}

function stopDictation() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  } else {
    recordingState[currentTab] = "idle";
    render();
  }
}

function getCurrentAudioWebhook() {
  return currentTab === "devis" ? webhookDevisAudio : webhookMailAudio;
}
  
function render() {
  const content = document.getElementById("content");
  content.innerHTML = "";

  if (currentTab === "mail") {
    content.innerHTML = `
<div class="item">
  <div class="item-info">
    <h3>Test mail vocal</h3>
<p>Parlez comme d’habitude.<br>
Votre message est transformé en mail professionnel automatiquement.</p>
<br>
<h3>Comment ça marche ?</h3>
<p>1. Entrez votre email<br>
2. Cliquez sur commencer<br>
3. Parlez normalement</p>
<br>
<h3>Exemple à dicter</h3>
<p>Écris à Anthony pour le remercier de son appel.<br>
Dis-lui que son devis sera envoyé aujourd’hui.<br>
Termine en lui souhaitant une bonne journée.</p>
  </div>
</div>

<div class="item" style="display:block; padding:16px 14px;">
  <div style="margin-bottom:16px;">
    <input
      id="emailInput"
      type="email"
      placeholder="Entrez votre email"
      value="${emailStore.mail || ""}"
      oninput="handleEmailInput(this.value)"
      style="
        height:34px;
        border-radius:10px;
        border:1px solid rgba(0,0,0,0.08);
        padding:0 12px;
        font-size:16px;
        width:100%;
        box-sizing:border-box;
        background:#ffffff;
        color:#111;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
      "
      onfocus="this.style.border='1px solid #209DB5'"
      onblur="this.style.border='1px solid rgba(0,0,0,0.08)'"
    >
  </div>

  ${emailError.mail ? `
    <div style="margin-bottom:12px; font-size:11px; color:#e74c3c; text-align:center; font-weight:600;">
      ${emailError.mail}
    </div>
  ` : ""}

  ${
  recordingState.mail === "idle" ? `
    <div style="display:flex; justify-content:center; margin-bottom:14px;">
      <button onclick="startDictation()">Commencer</button>
    </div>
    <div class="item-info">
  <p>Votre mail est généré et envoyé automatiquement.</p>
  <p style="font-size:10px; opacity:0.6; margin-top:6px;">Version de démonstration simplifiée — les versions professionnelles sont plus complètes.</p>
</div>
  ` : recordingState.mail === "recording" ? `
    <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:10px;">
      <div style="
        width:14px;
        height:14px;
        border-radius:50%;
        background:#209DB5;
        box-shadow:0 0 0 0 rgba(32,157,181,0.35);
        animation:pulseMic 1.4s infinite;
        margin-bottom:10px;
      "></div>
      <div style="font-size:11px; color:#8e8e93; margin-bottom:14px;">Enregistrement en cours...</div>
      <button onclick="stopDictation()">Arrêter</button>
    </div>
  ` : recordingState.mail === "processing" ? `
    <div style="display:flex; flex-direction:column; align-items:center;">
      <div style="
        width:14px;
        height:14px;
        border-radius:50%;
        background:#209DB5;
        opacity:0.75;
        margin-bottom:10px;
      "></div>
      <div style="font-size:11px; color:#8e8e93;">Traitement en cours...</div>
    </div>
  ` : `
    <div style="display:flex; flex-direction:column; align-items:center;">
     <div style="font-size:11px; color:#8e8e93; margin-bottom:8px; text-align:center;">
  Votre message est en cours d'envoi.
</div>
<div style="font-size:11px; color:#8e8e93; text-align:center; margin-bottom:8px;">
  Il arrive dans quelques secondes.
</div>
<div style="font-size:11px; color:#8e8e93; text-align:center; margin-bottom:12px;">
  Pensez à vérifier vos spams / indésirables si besoin.
</div>

<div style="text-align:center; margin-top:10px;">
  <div style="font-size:11px; color:#8e8e93; margin-bottom:8px;">
    Vous voulez le même système ?
  </div>

  <button onclick="window.open('https://calendly.com/contact-claritysystems/prise-de-rendez-vous', '_blank')">
    Réserver une démo
  </button>
</div>
  `
}
</div>
    `;
  } else if (currentTab === "devis") {
    content.innerHTML = `
<div class="item">
  <div class="item-info">
    <h3>Test devis vocal</h3>
<p>Dictez simplement les lignes de votre devis.<br>
Le PDF est généré automatiquement et envoyé par mail.</p>
<br>
<h3>Comment ça marche ?</h3>
<p>1. Entrez votre email<br>
2. Cliquez sur commencer<br>
3. Dictez vos lignes de devis</p>
<br>
<h3>Exemples à dicter</h3>
<p>
• Pose de carrelage, 20 m² à 20 euros le mètre carré<br>
• Fourniture de spots, 10 pièces à 15 euros l’unité<br>
• Installation portail, forfait à 3000 euros
</p>
  </div>
</div>

<div class="item" style="display:block; padding:16px 14px;">
  <div style="margin-bottom:16px;">
    <input
      id="emailInput"
      type="email"
      placeholder="Entrez votre email"
      value="${emailStore.devis || ""}"
      oninput="handleEmailInput(this.value)"
      style="
        height:34px;
        border-radius:10px;
        border:1px solid rgba(0,0,0,0.08);
        padding:0 12px;
        font-size:16px;
        width:100%;
        box-sizing:border-box;
        background:#ffffff;
        color:#111;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
      "
      onfocus="this.style.border='1px solid #209DB5'"
      onblur="this.style.border='1px solid rgba(0,0,0,0.08)'"
    >
  </div>

  ${emailError.devis ? `
    <div style="margin-bottom:12px; font-size:11px; color:#e74c3c; text-align:center; font-weight:600;">
      ${emailError.devis}
    </div>
  ` : ""}

  ${
  recordingState.devis === "idle" ? `
    <div style="display:flex; justify-content:center; margin-bottom:14px;">
      <button onclick="startDictation()">Commencer</button>
    </div>
   <div class="item-info">
  <p>Pour ce test, vous pouvez dicter jusqu’à 5 lignes.<br>
  Votre devis est généré et envoyé par mail.</p>
  <p style="font-size:10px; opacity:0.6; margin-top:6px;">Version de démonstration simplifiée — les versions professionnelles sont plus complètes.</p>
</div>
  ` : recordingState.devis === "recording" ? `
    <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:10px;">
      <div style="
        width:14px;
        height:14px;
        border-radius:50%;
        background:#209DB5;
        box-shadow:0 0 0 0 rgba(32,157,181,0.35);
        animation:pulseMic 1.4s infinite;
        margin-bottom:10px;
      "></div>
      <div style="font-size:11px; color:#8e8e93; margin-bottom:14px;">Enregistrement en cours...</div>
      <button onclick="stopDictation()">Arrêter</button>
    </div>
  ` : recordingState.devis === "processing" ? `
    <div style="display:flex; flex-direction:column; align-items:center;">
      <div style="
        width:14px;
        height:14px;
        border-radius:50%;
        background:#209DB5;
        opacity:0.75;
        margin-bottom:10px;
      "></div>
      <div style="font-size:11px; color:#8e8e93;">Traitement en cours...</div>
    </div>
  ` : `
    <div style="display:flex; flex-direction:column; align-items:center;">
      <div style="font-size:11px; color:#8e8e93; margin-bottom:8px; text-align:center;">
  Votre devis est en cours de création.
</div>
<div style="font-size:11px; color:#8e8e93; text-align:center; margin-bottom:8px;">
  Il arrive dans quelques secondes.
</div>
<div style="font-size:11px; color:#8e8e93; text-align:center; margin-bottom:12px;">
  Pensez à vérifier vos spams / indésirables si besoin.
</div>

<div style="text-align:center; margin-top:10px;">
  <div style="font-size:11px; color:#8e8e93; margin-bottom:8px;">
    Vous voulez le même système ?
  </div>

  <button onclick="window.open('https://calendly.com/contact-claritysystems/prise-de-rendez-vous', '_blank')">
    Réserver une démo
  </button>
</div>
  `
}
</div>
    `;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  render();
});
</script>

</body>
</html>
